global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: forgentic-phase0
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Forgentic app LXC
  - job_name: traefik
    static_configs:
      - targets: ["192.168.10.52:8082"]
        labels:
          service: traefik

  - job_name: forgentic-app-node
    static_configs:
      - targets: ["192.168.10.52:9100"]

  - job_name: synterra-workers
    metrics_path: /metrics
    static_configs:
      - targets: ["192.168.10.52:3002", "192.168.10.52:3003"]
        labels:
          service: workers

  - job_name: synterra-api
    metrics_path: /metrics
    static_configs:
      - targets: ["192.168.10.52:3001"]
        labels:
          service: api

  # Web /metrics route not shipped yet — enable once the Next.js app
  # exposes GET /api/metrics.
  # - job_name: synterra-web
  #   metrics_path: /api/metrics
  #   static_configs:
  #     - targets: ["192.168.10.52:3000"]
  #       labels:
  #         service: web

  # DB LXC
  - job_name: postgres
    static_configs:
      - targets: ["192.168.10.50:9187"]
        labels:
          service: postgres

  - job_name: forgentic-db-node
    static_configs:
      - targets: ["192.168.10.50:9100"]

  # Cache LXC
  - job_name: redis
    static_configs:
      - targets: ["192.168.10.51:9121"]
        labels:
          service: redis

  - job_name: forgentic-cache-node
    static_configs:
      - targets: ["192.168.10.51:9100"]

  # Aquila (existing data plane)
  - job_name: aquila
    static_configs:
      - targets: ["192.168.10.42:9090"]
    honor_labels: true
