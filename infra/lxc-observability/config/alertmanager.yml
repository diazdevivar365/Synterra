global:
  resolve_timeout: 5m
  smtp_from: alerts@forgentic.io
  smtp_smarthost: "${SMTP_HOST}:587"
  smtp_auth_username: "${SMTP_USER}"
  smtp_auth_password: "${SMTP_PASSWORD}"
  smtp_require_tls: true

route:
  receiver: default
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: critical
      continue: true

receivers:
  - name: default
    email_configs:
      - to: alerts@forgentic.io
        send_resolved: true

  - name: critical
    email_configs:
      - to: alerts@forgentic.io
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, job]
